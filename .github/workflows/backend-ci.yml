name: Backend CI

on:
  pull_request:
    branches:
      - main
      - dev
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

concurrency:
  group: backend-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.14'
  MYPY_VERSION: '1.19.1'
  BLACK_VERSION: '26.1.0'
  ISORT_VERSION: '8.0.1'

jobs:
  lint-black:
    name: Lint | Black
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          allow-prereleases: true
          cache: pip

      - name: Install Black
        run: pip install black==${{ env.BLACK_VERSION }}

      - name: Run Black
        working-directory: backend
        run: black --check --diff .

  lint-isort:
    name: Lint | isort
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          allow-prereleases: true
          cache: pip

      - name: Install isort
        run: pip install isort==${{ env.ISORT_VERSION }}

      - name: Run isort
        working-directory: backend
        run: isort --check-only --diff --profile black .

  lint-mypy:
    name: Lint | Mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          allow-prereleases: true
          cache: pip
          cache-dependency-path: |
            backend/requirements.in
            backend/requirements-dev.in

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install mypy==${{ env.MYPY_VERSION }}
          pip install -r requirements.in
          pip install -r requirements-dev.in

      - name: Run Mypy
        working-directory: backend
        run: mypy . --ignore-missing-imports

  lint:
    name: Lint Stage
    runs-on: ubuntu-latest
    needs:
      - lint-black
      - lint-isort
      - lint-mypy
    steps:
      - name: Lint stage passed
        run: echo "All lint checks passed."

  test:
    name: Test Stage
    runs-on: ubuntu-latest
    needs: lint
    env:
      PYTHONPATH: ..
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          allow-prereleases: true
          cache: pip
          cache-dependency-path: |
            backend/requirements.in
            backend/requirements-dev.in

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.in
          pip install -r requirements-dev.in

      - name: Run Unit Tests (dev branch)
        if: github.base_ref == 'dev'
        working-directory: backend
        run: pytest -m unit -vv

      - name: Run Release Tests (main branch)
        if: github.base_ref == 'main'
        working-directory: backend
        run: pytest -vv