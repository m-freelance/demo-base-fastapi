version: '3.8'

services:
  database:
    image: postgres:17.0
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${POSTGRES_DB} -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure
    ports:
      - "5432:5432"
    networks:
      - app-network
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    environment:
      - DEPLOYMENT_TYPE=prod
      - CONFIG_PATHS=resources/default_config.yaml;resources/prod_config.yaml
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - app-network
    volumes:
      - backend-logs:/app/data/logs
    restart: on-failure
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

  backend-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    environment:
      - DEPLOYMENT_TYPE=local
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - app-network
    volumes:
      - ./backend:/app
      - backend-logs:/app/data/logs
    restart: on-failure
    profiles:
      - dev

volumes:
  pgdata:
  backend-logs:

networks:
  app-network: